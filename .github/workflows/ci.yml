name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 부트스트랩 단계(코드 전): pyproject.toml 없으면 graceful skip.
      # SPEC-AI-001에서 uv 프로젝트가 들어오면 정식 동작.
      - name: Check project bootstrap
        id: bootstrap
        run: |
          if [ -f pyproject.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml 없음 — Python 프로젝트 부트스트랩 전. lint 스킵."
          fi

      - name: Setup uv
        if: steps.bootstrap.outputs.ready == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.bootstrap.outputs.ready == 'true'
        run: uv sync --frozen

      - name: Run ruff (lint + format check)
        if: steps.bootstrap.outputs.ready == 'true'
        run: |
          uv run ruff check .
          uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project bootstrap
        id: bootstrap
        run: |
          if [ -f pyproject.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml 없음 — Python 프로젝트 부트스트랩 전. test 스킵."
          fi

      - name: Setup uv
        if: steps.bootstrap.outputs.ready == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.bootstrap.outputs.ready == 'true'
        run: uv sync --frozen

      - name: Run pytest
        if: steps.bootstrap.outputs.ready == 'true'
        run: uv run pytest
